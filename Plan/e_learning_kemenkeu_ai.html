    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        kemenkeu: {
                            navy: '#0A2240',
                            navyLight: '#15335B',
                            gold: '#F4B223',
                            goldHover: '#E09F12',
                            slate: '#F8FAFC',
                            charcoal: '#1E293B'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }

            }
        }

    <style>
        body { font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        mark { background-color: #F4B223; color: #0A2240; border-radius: 2px; padding: 0 2px; font-weight: bold; }
        
        /* Keyframe Pulse Animation for FAQ (Navy Light) */
        @keyframes pulse-navy {
            0% { box-shadow: 0 0 0 0 rgba(21, 51, 91, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(21, 51, 91, 0); }
            100% { box-shadow: 0 0 0 0 rgba(21, 51, 91, 0); }
        }
        
        /* Keyframe Pulse Animation for Chatbot (Gold) */
        @keyframes pulse-gold {
            0% { box-shadow: 0 0 0 0 rgba(244, 178, 35, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(244, 178, 35, 0); }
            100% { box-shadow: 0 0 0 0 rgba(244, 178, 35, 0); }
        }

        .pulse-navy-btn {
            animation: pulse-navy 2s infinite;
        }

        .pulse-gold-btn {
            animation: pulse-gold 2s infinite;
        }

        /* ROBUST CSS PSEUDO-FULLSCREEN FALLBACK FOR SANDBOXED IFRAMES */
        .pseudo-fullscreen {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100vw !important;
            height: 100vh !important;
            max-width: 100vw !important;
            max-height: 100vh !important;
            z-index: 9999 !important;
            border-radius: 0 !important;
            margin: 0 !important;
            background-color: #020617 !important; /* Slate 955 */
            display: flex !important;
            flex-direction: column !important;
            justify-content: space-between !important;
        }

        .pseudo-fullscreen > div:first-child {
            margin: auto 0 !important; /* Centers the 16:9 viewport vertically in portrait screens */
            width: 100% !important;
        }
    </style>
</head>
<body class="bg-slate-50 text-kemenkeu-charcoal flex flex-col min-h-screen selection:bg-kemenkeu-gold selection:text-kemenkeu-navy overflow-x-hidden pt-6">

                                    </div>

                                </div>

                            </div>
                        </div>

                    </div>

                    <!-- E-Learning Control Toolbar (Footer Controls) -->
                    <div class="bg-kemenkeu-navy px-4 py-2.5 flex flex-wrap items-center justify-between gap-3 border-t border-kemenkeu-navyLight z-10 relative">

                <div class="divide-y divide-slate-100 overflow-y-auto flex-1 text-xs" id="sidebar-results-container"></div>
            </div>

        </div>
    </main>

        // DEEP CONTENT SEARCH ENGINE & VISIBILITY CONTROL
        function searchInsideSlideContent() {
            const queryInput = document.getElementById('slide-internal-search');
            const mainGrid = document.getElementById('main-grid-layout');
            const playerWrapper = document.getElementById('player-column-wrapper');
            const sidebar = document.getElementById('search-sidebar');
            const resultsContainer = document.getElementById('sidebar-results-container');
            const counterTag = document.getElementById('sidebar-match-counter');
            const clearBtn = document.getElementById('clear-search-btn');

            const keyword = queryInput.value.toLowerCase().trim();
            activeSearchSearchKeyword = keyword;

            if (!keyword) {
                if (clearBtn) clearBtn.classList.add('hidden');
                
                sidebar.classList.add('hidden');
                sidebar.classList.remove('lg:flex');
                playerWrapper.className = "lg:col-span-4 flex flex-col space-y-4 transition-all duration-300";
                renderSlideView(); 
                return;
            }

            if (clearBtn) clearBtn.classList.remove('hidden');

            sidebar.classList.remove('hidden');
            sidebar.classList.add('lg:flex');
            playerWrapper.className = "lg:col-span-3 flex flex-col space-y-4 transition-all duration-300";

            resultsContainer.innerHTML = '';
            let matchCount = 0;

            slideDataset.forEach(slide => {
                const fullPool = `${slide.title} ${slide.subtitle} ${slide.content} ${slide.desc}`.toLowerCase();
                
                if (fullPool.includes(keyword)) {
                    matchCount++;
                    const isActive = (slide.id === currentSlide);
                    
                    const contextString = `${slide.subtitle}: ${slide.content} ${slide.desc}`;
                    const startPos = Math.max(0, contextString.toLowerCase().indexOf(keyword) - 15);
                    const endPos = Math.min(contextString.length, startPos + keyword.length + 55);
                    let snippet = contextString.substring(startPos, endPos);
                    
                    const regex = new RegExp(`(${keyword})`, 'gi');
                    snippet = snippet.replace(regex, `<mark>$1</mark>`);

                    const card = document.createElement('div');
                    card.onclick = () => jumpToSlide(slide.id);
                    card.className = `p-3 hover:bg-slate-50 cursor-pointer transition-all border-l-4 ${isActive ? 'border-kemenkeu-gold bg-indigo-50/20' : 'border-transparent'} flex flex-col space-y-1`;
                    
                    card.innerHTML = `
                        <div class="flex items-center justify-between text-[11px]">
                            <span class="font-bold text-kemenkeu-navy">${slide.title}</span>
                            <span class="text-[9px] text-slate-400 font-medium">Buka <i class="fa-solid fa-arrow-right text-[8px]"></i></span>
                        </div>
                        <p class="text-[10px] text-slate-500 leading-relaxed italic">"...${snippet}..."</p>
                    `;
                    resultsContainer.appendChild(card);
                }
            });

            counterTag.innerText = `${matchCount} Cocok`;

            if (matchCount === 0) {
                resultsContainer.innerHTML = `
                    <div class="text-center py-12 px-4 text-slate-400">
                        <i class="fa-solid fa-ban text-3xl mb-2 text-slate-200 block"></i>
                        Kata kunci tidak ditemukan pada materi apa pun.
                    </div>
                `;
            }

            renderSlideView();
        }

        // Master UI Sync State
        function updateUIForSlide() {
            for (let i = 1; i <= totalSlides; i++) {
                const el = document.getElementById(`slide-${i}`);
                if (el) {
                    if (i === currentSlide) el.classList.remove('hidden');
                    else el.classList.add('hidden');
                }
            }

            completedSlides[currentSlide] = true;
            
            const currentData = slideDataset.find(s => s.id === currentSlide);
            const activeTitleEl = document.getElementById('active-slide-title');
            if (activeTitleEl) {
                activeTitleEl.innerText = currentData.title;
            }
            document.getElementById('slide-number').innerText = `Slide ${currentSlide} / ${totalSlides}`;
            
            const descEl = document.getElementById('slide-description-text');
            if (descEl) {
                descEl.innerHTML = currentData.desc;
            }
            
            document.getElementById('slide-selector').value = currentSlide;

            document.getElementById('btn-prev').disabled = (currentSlide === 1);
            document.getElementById('btn-next').disabled = (currentSlide === totalSlides);

            const completedCount = Object.keys(completedSlides).length;
            const percent = Math.round((completedCount / totalSlides) * 100);
            document.getElementById('course-progress-percent').innerText = `${percent}% Selesai`;
            document.getElementById('course-progress-bar').style.width = `${percent}%`;

            renderSlideView();
            searchInsideSlideContent();
            resetAutoplayProgressBar();
        }

        // Navigation Handlers
        function nextSlide() {
            if (currentSlide < totalSlides) { currentSlide++; updateUIForSlide(); }
            else { pauseSlide(); }
        }

        function prevSlide() {
            if (currentSlide > 1) { currentSlide--; updateUIForSlide(); }
        }

        function jumpToSlide(index) {
            currentSlide = parseInt(index);
            updateUIForSlide();
        }

        function togglePlay() {
            if (isPlaying) { pauseSlide(); } 
            else { playSlide(); }
        }

        function playSlide() {
            isPlaying = true;
            document.getElementById('play-pause-icon').className = "fa-solid fa-pause text-xs";
            document.getElementById('btn-play-pause').classList.add('bg-kemenkeu-gold', 'text-kemenkeu-navy');

            autoplayProgress = 0;
            playInterval = setInterval(() => {
                autoplayProgress += (tickRate / autoplayDurationPerSlide) * 100;
                const bar = document.getElementById('autoplay-progress-bar');
                if (bar) bar.style.width = `${autoplayProgress}%`;

                if (autoplayProgress >= 100) {
                    autoplayProgress = 0;
                    if (currentSlide < totalSlides) { nextSlide(); } 
                    else { jumpToSlide(1); }
                }
            }, tickRate);
        }

        function pauseSlide() {
            isPlaying = false;
            document.getElementById('play-pause-icon').className = "fa-solid fa-play text-xs";
            document.getElementById('btn-play-pause').classList.remove('bg-kemenkeu-gold', 'text-kemenkeu-navy');
            clearInterval(playInterval);
            const bar = document.getElementById('autoplay-progress-bar');
            if (bar) bar.style.width = `0%`;
        }

        function resetAutoplayProgressBar() {
            autoplayProgress = 0;
            const bar = document.getElementById('autoplay-progress-bar');
            if (bar) bar.style.width = `0%`;
            if (isPlaying) {
                clearInterval(playInterval);
                playSlide();
            }
        }

        function toggleFullscreen() {
            const wrapper = document.getElementById('player-wrapper');
            const icon = document.getElementById('btn-fullscreen').querySelector('i');
            
            const isInFullscreen = document.fullscreenElement || 
                                   document.webkitFullscreenElement || 
                                   document.mozFullScreenElement || 
                                   document.msFullscreenElement ||
                                   wrapper.classList.contains('pseudo-fullscreen');
            
            if (!isInFullscreen) {
                const requestFS = wrapper.requestFullscreen || 
                                  wrapper.webkitRequestFullscreen || 
                                  wrapper.mozRequestFullScreen || 
                                  wrapper.msRequestFullscreen;
                
                if (requestFS) {
                    requestFS.call(wrapper)
                        .then(() => {
                            icon.className = "fa-solid fa-compress text-xs";
                        })
                        .catch(err => {
                            console.warn("Iframe memblokir fullscreen asli, beralih ke Pseudo-Fullscreen.", err);
                            enablePseudoFullscreen(wrapper, icon);
                        });
                } else {
                    enablePseudoFullscreen(wrapper, icon);
                }
            } else {
                const exitFS = document.exitFullscreen || 
                               document.webkitExitFullscreen || 
                               document.mozCancelFullScreen || 
                               document.msExitFullscreen;
                
                if (exitFS && !wrapper.classList.contains('pseudo-fullscreen')) {
                    exitFS.call(document)
                        .then(() => {
                            icon.className = "fa-solid fa-expand text-xs";
                        })
                        .catch(() => {
                            disablePseudoFullscreen(wrapper, icon);
                        });
                } else {
                    disablePseudoFullscreen(wrapper, icon);
                }
            }
        }

        function enablePseudoFullscreen(wrapper, icon) {
            wrapper.classList.add('pseudo-fullscreen');
            icon.className = "fa-solid fa-compress text-xs";
            document.body.style.overflow = 'hidden';
        }

        function disablePseudoFullscreen(wrapper, icon) {
            wrapper.classList.remove('pseudo-fullscreen');
            icon.className = "fa-solid fa-expand text-xs";
            document.body.style.overflow = '';
        }

        const fullscreenEvents = ['fullscreenchange', 'webkitfullscreenchange', 'mozfullscreenchange', 'MSFullscreenChange'];
        fullscreenEvents.forEach(evt => {
            document.addEventListener(evt, () => {
                const wrapper = document.getElementById('player-wrapper');
                const icon = document.getElementById('btn-fullscreen').querySelector('i');
                const isNativeFS = document.fullscreenElement || 
                                   document.webkitFullscreenElement || 
                                   document.mozFullscreenElement || 
                                   document.msFullscreenElement;
                if (!isNativeFS && !wrapper.classList.contains('pseudo-fullscreen')) {
                    icon.className = "fa-solid fa-expand text-xs";
                }
            });
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                const wrapper = document.getElementById('player-wrapper');
                const icon = document.getElementById('btn-fullscreen').querySelector('i');
                if (wrapper.classList.contains('pseudo-fullscreen')) {
                    disablePseudoFullscreen(wrapper, icon);
                }
            }
        });

                if (clearBtn) clearBtn.classList.add('hidden');
            }

            const filtered = faqDatabase.filter(faq => {
                const matchesSearch = faq.pertanyaan.toLowerCase().includes(searchValue) || 
                                     faq.jawaban.toLowerCase().includes(searchValue) || 
                                     faq.regulasi.toLowerCase().includes(searchValue);
                const matchesCategory = categoryValue === 'ALL' || faq.kategori === categoryValue;
                const matchesDifficulty = difficultyValue === 'ALL' || faq.kesulitan === difficultyValue;
                const matchesFavs = !filterFavsOnly || favorites.includes(faq.id);

                return matchesSearch && matchesCategory && matchesDifficulty && matchesFavs;
            });

            if (filtered.length === 0) {
                container.innerHTML = `<div class="text-center text-slate-400 py-6 italic text-[10px]">Pertanyaan tidak ditemukan.</div>`;
                return;
            }

            filtered.forEach(faq => {
                const isFav = favorites.includes(faq.id);
                const item = document.createElement('div');
                item.className = "bg-white border rounded-lg overflow-hidden shadow-sm flex flex-col";
                
                const diffBadgeColor = faq.kesulitan === 'Sangat Penting' ? 'bg-red-50 text-red-700 border-red-200' :
                                      faq.kesulitan === 'Menengah' ? 'bg-orange-50 text-orange-700 border-orange-200' : 'bg-slate-100 text-slate-700 border-slate-200';

                item.innerHTML = `
                    <div class="p-2.5 flex items-start gap-2 cursor-pointer hover:bg-slate-50 transition" onclick="toggleFAQAccordion('faq-item-ans-${faq.id}')">
                        <div class="flex-grow space-y-1">
                            <div class="flex flex-wrap items-center gap-1">
                                <span class="bg-amber-150 text-amber-800 text-[8px] font-black uppercase px-1 py-0.2 rounded border border-amber-200">${faq.kategori}</span>
                                <span class="border text-[8px] font-bold px-1 py-0.2 rounded ${diffBadgeColor}">${faq.kesulitan}</span>
                            </div>
                            <div class="font-bold text-slate-800 text-[10px] leading-snug">${faq.pertanyaan}</div>
                        </div>
                        <div class="flex items-center gap-2 self-center shrink-0">
                            <button onclick="event.stopPropagation(); toggleFavoriteFAQ(${faq.id})" class="text-xs transition transform hover:scale-110">
                                <i class="${isFav ? 'fa-solid text-amber-500' : 'fa-regular text-slate-400'} fa-star"></i>
                            </button>
                            <span class="text-slate-400 text-[10px]" id="faq-chevron-faq-item-ans-${faq.id}">
                                <i class="fa-solid fa-chevron-down"></i>
                            </span>
                        </div>
                    </div>
                    <div id="faq-item-ans-${faq.id}" class="hidden p-2.5 border-t bg-slate-50/50 space-y-2 text-[9px] leading-relaxed text-slate-600">
                        <div class="font-medium text-slate-700">${faq.jawaban}</div>
                        <div class="pt-1.5 border-t border-slate-200 flex items-center gap-1">
                            <span class="text-slate-400 font-bold uppercase text-[8px]">Rujukan:</span>
                            <span class="font-semibold text-slate-700 bg-slate-100 py-0.5 px-1 rounded border border-slate-200">${faq.regulasi}</span>
                        </div>
                    </div>
                `;
                container.appendChild(item);
            });
        }

        function filterFAQs() {
            renderFAQs();
        }

        function sendMessage() {
            const input = document.getElementById('chat-input');
            const txt = input.value.trim();
            if (!txt) return;

            const box = document.getElementById('chat-messages');
            const userMsg = document.createElement('div');
            userMsg.className = "bg-kemenkeu-gold/20 border border-kemenkeu-gold/40 text-kemenkeu-navy font-semibold p-2 rounded-lg self-end ml-6 text-right";
            userMsg.innerText = txt;
            box.appendChild(userMsg);
            input.value = '';

            setTimeout(() => {
                const botMsg = document.createElement('div');
                botMsg.className = "bg-white p-2.5 rounded-lg border border-slate-100 shadow-sm text-slate-700 leading-relaxed";
                botMsg.innerHTML = `<strong>Srikandi AI:</strong> Menanggapi kata pencarian kueri Anda mengenai "<em>${txt}</em>", gunakan bar pencarian internal di atas slide untuk melacak cuplikan materi rujukan secara real-time.`;
                box.appendChild(botMsg);
                box.scrollTop = box.scrollHeight;
            }, 700);

            box.scrollTop = box.scrollHeight;
        }

        function handleChatEnter(e) { if (e.key === 'Enter') sendMessage(); }

        function checkAnswer(isCorrect, btn) {
            document.querySelectorAll('.quiz-option').forEach(o => {
                o.className = "quiz-option text-left p-2.5 rounded-lg bg-white/5 border border-white/10 hover:bg-white/10 transition-all flex items-center justify-between w-full";
                o.querySelector('i').className = "fa-regular fa-circle text-slate-400";
            });

            const fb = document.getElementById('quiz-feedback');
            if (isCorrect) {
                btn.className = "quiz-option text-left p-2.5 rounded-lg bg-emerald-500/20 border border-emerald-400 text-white flex items-center justify-between w-full";
                btn.querySelector('i').className = "fa-solid fa-circle-check text-emerald-400";
                fb.innerHTML = `<span class="text-emerald-400 font-bold"><i class="fa-solid fa-square-check"></i> Jawaban Benar! Kementerian Keuangan memegang penuh mandat otoritas fiskal nasional.</span>`;
            } else {
                btn.className = "quiz-option text-left p-2.5 rounded-lg bg-red-500/20 border border-red-400 text-white flex items-center justify-between w-full";
                btn.querySelector('i').className = "fa-solid fa-circle-xmark text-red-400";
                fb.innerHTML = `<span class="text-red-400 font-medium"><i class="fa-solid fa-circle-exclamation"></i> Kurang tepat. Silakan tinjau kembali materi struktur APBN pada Slide 2.</span>`;
            }
        }
    </script>
</body>
</html>
